async function cargarDatos(r=false){if(r)setRefreshing(true);else setLoading(true);setError("");try{const [rc,rp,rprod,rrep,rcob,rpe]=await Promise.all([sb.from("clientes").select("*").order("zona"),sb.from("pedidos").select("*").order("id",{ascending:false}),sb.from("productos").select("*").order("id"),sb.from("repartidores").select("*").order("id"),sb.from("cobros").select("*").order("id",{ascending:false}),sb.from("precios_especiales").select("*")]);if(rc.error)throw rc.error;if(rc.data)setClientes(rc.data);if(rp.data)setPedidos(rp.data);if(rprod.data)setProductos(rprod.data);if(rrep.data){setRepartidores(rrep.data);if(!turnoRep&&rrep.data[0])setTurnoRep(rrep.data[0].id);}if(rcob.data)setCobros(rcob.data);if(rpe.data)setPreciosEspeciales(rpe.data);await cargarUbicaciones();}catch(e){setError("Error de conexion.");}setLoading(false);setRefreshing(false);}
useEffect(()=>{cargarDatos();const ch=sb.channel("c").on("postgres_changes",{event:"*",schema:"public",table:"clientes"},()=>cargarDatos()).on("postgres_changes",{event:"*",schema:"public",table:"pedidos"},()=>cargarDatos()).on("postgres_changes",{event:"*",schema:"public",table:"cobros"},()=>cargarDatos()).on("postgres_changes",{event:"*",schema:"public",table:"ubicaciones_repartidor"},()=>cargarUbicaciones()).subscribe();const intervalo=setInterval(cargarUbicaciones,30000);return()=>{sb.removeChannel(ch);clearInterval(intervalo);};},[]);

async function saveC(){if(!fC.nombre.trim())return;setSaving(true);setSaveError("");try{const datos={nombre:fC.nombre,telefono:fC.telefono||"",email:fC.email||"",direccion:fC.direccion||"",ciudad:fC.ciudad||"",provincia:fC.provincia||"",pais:fC.pais||"",zona:fC.zona||"Z1",notas:fC.notas||"",lat:fC.lat||null,lng:fC.lng||null};if(editC){const{error}=await sb.from("clientes").update(datos).eq("id",editC.id);if(error)throw error;}else{const{error}=await sb.from("clientes").insert({...datos,saldo:0,bidones:0});if(error)throw error;}await cargarDatos();setModal(null);setEditC(null);}catch(e){setSaveError("Error: "+e.message);}setSaving(false);}

async function saveP(){if(!fP.clienteId||!fP.productoId||!fP.repId)return;const pr=productos.find(p=>p.id===Number(fP.productoId));const precioEsp=getPrecioEsp(preciosEspeciales,fP.clienteId,fP.productoId);const precioUnit=precioEsp!==null?precioEsp:pr.price;const total=precioUnit*Number(fP.cantidad);setSaving(true);setSaveError("");try{const{error:e1}=await sb.from("pedidos").insert({clienteId:Number(fP.clienteId),productoId:Number(fP.productoId),repId:Number(fP.repId),cantidad:Number(fP.cantidad),fecha:fP.fecha,estado:"pendiente",pagado:false,total});if(e1)throw e1;const cl=clientes.find(c=>c.id===Number(fP.clienteId));const{error:e2}=await sb.from("clientes").update({saldo:(cl.saldo||0)-total,bidones:(cl.bidones||0)+Number(fP.cantidad)}).eq("id",Number(fP.clienteId));if(e2)throw e2;await cargarDatos();setModal(null);setFP({clienteId:"",productoId:"",cantidad:1,repId:"",fecha:today(),estado:"pendiente"});}catch(e){setSaveError("Error: "+e.message);}setSaving(false);}

async function cobrar(){const m=Number(fPago.monto);if(!m||!fPago.pedidoId)return;const pd=pedidos.find(p=>p.id===Number(fPago.pedidoId));if(!pd)return;setSaving(true);try{await sb.from("pedidos").update({pagado:true}).eq("id",Number(fPago.pedidoId));const cl=clientes.find(c=>c.id===pd.clienteId);await sb.from("clientes").update({saldo:(cl.saldo||0)+m}).eq("id",pd.clienteId);await cargarDatos();setModal(null);setFPago({monto:"",pedidoId:""});}catch(e){}setSaving(false);}
async function ajustarSaldo(){const m=Number(ajusteMonto);if(!m||!ajusteC)return;setSaving(true);const nuevoSaldo=ajusteTipo==="debe"?-m:m;try{await sb.from("clientes").update({saldo:nuevoSaldo}).eq("id",ajusteC.id);await cargarDatos();setAjusteC(null);setAjusteMonto("");}catch(e){}setSaving(false);}
async function crearTurno(){if(!turnoRep)return;const hay=productos.some(p=>turnoCantidades[p.id]>0);if(!hay){setTurnoMsg("Asigna al menos un producto.");return;}setTurnoGuardando(true);setTurnoMsg("");try{const ins={repartidorId:Number(turnoRep),fecha:today(),estado:"pendiente",aceptado:false};ins["dineroInicial"]=Number(turnoDinero)||0;const{data:t,error:e1}=await sb.from("turnos").insert(ins).select().single();if(e1)throw e1;const prods=productos.filter(p=>(turnoCantidades[p.id]||0)>0).map(p=>({turnoId:t.id,productoId:p.id,cantidad:Number(turnoCantidades[p.id])}));if(prods.length){const{error:e2}=await sb.from("turno_productos").insert(prods);if(e2)throw e2;}setTurnoMsg("Turno creado y enviado");setTurnoCantidades({});setTurnoDinero("");}catch(e){setTurnoMsg("Error: "+e.message);}setTurnoGuardando(false);}

{delC&&(<Modal title="Eliminar?" onClose={()=>setDelC(null)}><div style={{color:C.text,marginBottom:16,fontSize:15,textAlign:"center"}}>Eliminar a <strong>{delC.nombre}F</strong>?</div><div style={{display:"flex",gap:10}}><button style={{...S.btn,background:C.bg3,marginTop:0,flex:1}} onClick={()=>setDelC(null)}>Cancelar</button><button style={{...S.btnR,flex:1}} onClick={()=>delCliente(delC.id)}>Eliminar</button></div></Modal>)}
{modal==="pedido"&&(<Modal title="Nuevo pedido" onClose={()=>setModal(null)}><Fld label="Cliente"><select style={S.inp} value={fP.clienteId} onChange={e=>setFP(f=>({...f,clienteId:e.target.value}))}><option value="">Seleccionar</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></Fld><Fld label="Producto"><select style={S.inp} value={fP.productoId} onChange={e=>setFP(f=>({...f,productoId:e.target.value}))}><option value="">Seleccionar</option>{productos.map(p=><option key={p.id} value={p.id}>{p.name} - {fmt(p.price)}</option>)}</select></Fld><Fld label="Cantidad"><input type="number" min={1} style={S.inp} value={fP.cantidad} onChange={e=>setFP(f=>({...f,cantidad:e.target.value}))}/></Fld><Fld label="Repartidor"><select style={S.inp} value={fP.repId} onChange={e=>setFP(f=>({...f,repId:e.target.value}))}><option value="">Seleccionar</option>{repartidores.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></Fld><Fld label="Fecha"><input type="date" style={S.inp} value={fP.fecha} onChange={e=>setFP(f=>({...f,fecha:e.target.value}))}/></Fld><div style={{background:C.bg2,borderRadius:10,padding:"13px",marginBottom:8,color:C.acc3,fontWeight:700,fontSize:17,textAlign:"center"}}>Total: {fmt((()=>{const pr=productos.find(p=>p.id===Number(fP.productoId));if(!pr)return 0;const pEsp=getPrecioEsp(preciosEspeciales,fP.clienteId,fP.productoId);return(pEsp!==null?pEsp:pr.price)*Number(fP.cantidad||1);})())}</div>{saveError&&<div style={{background:"#1c0505",border:"1px solid #991b1b",borderRadius:8,padding:"10px",marginBottom:8,color:C.err,fontSize:13}}>{saveError}</div>}<button style={S.btn} className="btn3d" className="btn3d" onClick={saveP} disabled={saving}>{saving?"...":"Registrar"}</button></Modal>)}
{modal==="pago"&&(<Modal title="Pago" onClose={()=>setModal(null)}><Fld label="Pedido"><select style={S.inp} value={fPago.pedidoId} onChange={e=>setFPago(f=>({...f,pedidoId:e.target.value}))}><option value="">Seleccionar</option>{pedidos.filter(p=>!p.pagado&&p.estado==="entregado").map(p=>{const cl=clientes.find(c=>c.id===p.clienteId);return<option key={p.id} value={p.id}>{cl?.nombre} - {fmt(p.total)}</option>;})}</select></Fld><Fld label="Monto"><input type="number" style={S.inp} value={fPago.monto} onChange={e=>setFPago(f=>({...f,monto:e.target.value}))} placeholder="0"/></Fld><button style={S.btn} className="btn3d" className="btn3d" onClick={cobrar} disabled={saving}>{saving?"...":"Confirmar"}</button></Modal>)}
</div>);}
