function MapaSeguimiento({repartidores,ubicaciones,recorrido}){
const ref=useRef(null),map=useRef(null);
const DEF_LAT=-33.8891,DEF_LNG=-61.1234;
useEffect(()=>{
if(!window.L||!ref.current)return;
const L=window.L;
if(map.current){map.current.remove();map.current=null;}
const lat=ubicaciones[0]?.lat||DEF_LAT;
const lng=ubicaciones[0]?.lng||DEF_LNG;
map.current=L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([lat,lng],14);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map.current);
setTimeout(()=>map.current&&map.current.invalidateSize(),300);
if(recorrido&&recorrido.length>1){
const pts=recorrido.map(u=>[u.lat,u.lng]);
L.polyline(pts,{color:"#00d4ff",weight:3,opacity:.7}).addTo(map.current);
}
repartidores.forEach(rep=>{
const ub=ubicaciones.find(u=>u.repartidorId===rep.id);
if(!ub)return;
const ri=L.divIcon({className:"",html:"<div style='background:#f59e0b;border:3px solid #fff;border-radius:50%;width:22px;height:22px;box-shadow:0 0 12px #f59e0b;display:flex;align-items:center;justify-content:center;font-size:11px;'>🚚</div>",iconSize:[22,22],iconAnchor:[11,11]});
L.marker([ub.lat,ub.lng],{icon:ri}).addTo(map.current).bindPopup("<b>"+rep.name+"</b><br>"+new Date(ub.created_at).toLocaleTimeString());
});
return()=>{if(map.current){map.current.remove();map.current=null;}};
},[ubicaciones,recorrido]);
return <div ref={ref} style={{width:"100%",height:320,borderRadius:12,overflow:"hidden",border:"1px solid "+C.border}}/>;}

<img src={LOGO} style={{width:36,height:36,objectFit:"contain",borderRadius:8,flexShrink:0}}/>
<div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:C.acc3,lineHeight:1}}>Vertiente Natural</div><div style={{fontSize:10,color:C.text2}}>Admin</div></div>
<button onClick={()=>cargarDatos(true)} style={{background:"none",border:"none",cursor:"pointer",color:C.acc3,padding:"4px"}}>{refreshing?<div style={{width:20,height:20,border:"2px solid "+C.acc3,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>:<I d={IC.rf} z={20}/>}</button>
<button onClick={cambiarRol} style={{background:C.bg2,border:"1px solid "+C.border,color:C.text2,borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11}}>Cambiar</button>
</div>
<div style={{padding:"16px 14px 110px",maxWidth:560,margin:"0 auto"}}>
<div style={{fontSize:18,fontWeight:800,color:C.text,marginBottom:14}}>{NAV.find(n=>n.id===tab)?.label}</div>
{renderTab()}
</div>
<div style={{position:"fixed",bottom:0,left:0,right:0,background:C.bg2,borderTop:"1px solid "+C.border,display:"flex",justifyContent:"space-around",padding:"8px 0",paddingBottom:"max(14px,env(safe-area-inset-bottom))",zIndex:50}}>
{NAV.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===n.id?C.acc3:C.text2,padding:"4px 4px",borderRadius:7}}><I d={n.icon} z={16}/><span style={{fontSize:7,fontWeight:tab===n.id?700:500}}>{n.label}</span></button>))}
</div>

{ajusteC&&(<Modal title={"Saldo - "+ajusteC.nombre} onClose={()=>setAjusteC(null)}><div style={{background:C.bg2,borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:C.text2}}>Actual: <span style={{color:ajusteC.saldo<0?C.err:ajusteC.saldo>0?C.grn3:C.text2,fontWeight:700}}>{ajusteC.saldo<0?"-":ajusteC.saldo>0?"+":""}{fmt(ajusteC.saldo)}</span></div><Fld label="Tipo"><div style={{display:"flex",gap:8}}><button onClick={()=>setAjusteTipo("debe")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="debe"?"#991b1b":C.border),background:ajusteTipo==="debe"?"#1c0505":C.bg2,color:ajusteTipo==="debe"?C.err:C.text2,cursor:"pointer",fontWeight:700}}>Debe</button><button onClick={()=>setAjusteTipo("favor")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="favor"?C.grn2:C.border),background:ajusteTipo==="favor"?C.bg3:C.bg2,color:ajusteTipo==="favor"?C.grn3:C.text2,cursor:"pointer",fontWeight:700}}>A favor</button></div></Fld><Fld label="Monto"><input type="number" style={S.inp} value={ajusteMonto} onChange={e=>setAjusteMonto(e.target.value)} placeholder="0"/></Fld><button style={S.btn} onClick={ajustarSaldo} disabled={saving}>{saving?"...":"Confirmar"}</button></Modal>)}
{modal==="cliente"&&(<Modal title={editC?"Editar":"Nuevo cliente"} onClose={()=>setModal(null)}><Fld label="Nombre"><input style={S.inp} value={fC.nombre} onChange={e=>setFC(f=>({...f,nombre:e.target.value}))} placeholder="Nombre"/></Fld><Fld label="Telefono"><input style={S.inp} type="tel" value={fC.telefono} onChange={e=>setFC(f=>({...f,telefono:e.target.value}))} placeholder="Tel"/></Fld><Fld label="Email"><input style={S.inp} type="email" value={fC.email} onChange={e=>setFC(f=>({...f,email:e.target.value}))} placeholder="Email"/></Fld><Fld label="Direccion"><input style={S.inp} value={fC.direccion} onChange={e=>setFC(f=>({...f,direccion:e.target.value}))} placeholder="Direccion"/></Fld><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Fld label="Ciudad"><select style={S.inp} value={fC.ciudad} onChange={e=>setFC(f=>({...f,ciudad:e.target.value}))}><option value="">Seleccionar</option><option value="Colon">Colon</option></select></Fld><Fld label="Provincia"><select style={S.inp} value={fC.provincia} onChange={e=>setFC(f=>({...f,provincia:e.target.value}))}><option value="">Seleccionar</option><option value="Buenos Aires">Buenos Aires</option></select></Fld></div><Fld label="Pais"><input style={S.inp} value={fC.pais} onChange={e=>setFC(f=>({...f,pais:e.target.value}))} placeholder="Pais"/></Fld><Fld label="Zona"><select style={S.inp} value={fC.zona} onChange={e=>setFC(f=>({...f,zona:e.target.value}))}>{ZONAS.map(z=><option key={z} value={z}>{z}</option>)}</select></Fld><Fld label="Notas"><textarea style={{...S.inp,resize:"vertical",minHeight:60}} value={fC.notas} onChange={e=>setFC(f=>({...f,notas:e.target.value}))} placeholder="Notas"/></Fld><Fld label="Foto de la casa"><div style={{background:C.bg2,borderRadius:10,padding:12,border:"1px solid "+C.border}}>{editC?.foto_url&&<img src={editC.foto_url} style={{width:"100%",maxHeight:140,objectFit:"cover",borderRadius:8,marginBottom:8}}/>}<input type="file" accept="image/*" capture="environment" onChange={e=>setFotoFile(e.target.files[0])} style={{color:C.text2,fontSize:13,width:"100%"}}/>{fotoFile&&<div style={{color:C.grn3,fontSize:12,marginTop:6}}>Foto lista para subir</div>}</div></Fld><div style={{background:C.bg2,borderRadius:11,padding:14,marginBottom:13,border:"1px solid "+C.border}}><div style={{fontWeight:700,color:C.grn3,fontSize:14,marginBottom:6}}>GPS</div><button onClick={getGPS} style={S.btnG}>Guardar ubicacion GPS</button>{geoMsg&&<div style={{fontSize:12,textAlign:"center",marginTop:10,padding:"8px",borderRadius:8,background:geoMsg.startsWith("GPS")?C.bg3:"#1c0505",color:geoMsg.startsWith("GPS")?C.grn3:C.err}}>{geoMsg}</div>}</div>{saveError&&<div style={{background:"#1c0505",border:"1px solid #991b1b",borderRadius:8,padding:"10px",marginBottom:8,color:C.err,fontSize:13}}>{saveError}</div>}<button style={S.btn} onClick={saveC} disabled={saving}>{saving?"...":editC?"Guardar":"Agregar"}</button>{editC&&<button style={{...S.btnR,marginTop:10}} onClick={()=>setDelC(editC)}>Eliminar</button>}</Modal>)}
{delC&&(<Modal title="Eliminar?" onClose={()=>setDelC(null)}><div style={{color:C.text,marginBottom:16,fontSize:15,textAlign:"center"}}>Eliminar a <strong>{delC.nombre}</strong>?</div><div style={{display:"flex",gap:10}}><button style={{...S.btn,background:C.bg3,marginTop:0,flex:1}} onClick={()=>setDelC(null)}>Cancelar</button><button style={{...S.btnR,flex:1}} onClick={()=>delCliente(delC.id)}>Eliminar</button></div></Modal>)}
{modal==="pedido"&&(<Modal title="Nuevo pedido" onClose={()=>setModal(null)}><Fld label="Cliente"><select style={S.inp} value={fP.clienteId} onChange={e=>setFP(f=>({...f,clienteId:e.target.value}))}><option value="">Seleccionar</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select></Fld><Fld label="Producto"><select style={S.inp} value={fP.productoId} onChange={e=>setFP(f=>({...f,productoId:e.target.value}))}><option value="">Seleccionar</option>{productos.map(p=><option key={p.id} value={p.id}>{p.name} - {fmt(p.price)}</option>)}</select></Fld><Fld label="Cantidad"><input type="number" min={1} style={S.inp} value={fP.cantidad} onChange={e=>setFP(f=>({...f,cantidad:e.target.value}))}/></Fld><Fld label="Repartidor"><select style={S.inp} value={fP.repId} onChange={e=>setFP(f=>({...f,repId:e.target.value}))}><option value="">Seleccionar</option>{repartidores.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}</select></Fld><Fld label="Fecha"><input type="date" style={S.inp} value={fP.fecha} onChange={e=>setFP(f=>({...f,fecha:e.target.value}))}/></Fld><div style={{background:C.bg2,borderRadius:10,padding:"13px",marginBottom:8,color:C.acc3,fontWeight:700,fontSize:17,textAlign:"center"}}>Total: {fmt((()=>{const pr=productos.find(p=>p.id===Number(fP.productoId));if(!pr)return 0;const pEsp=getPrecioEsp(preciosEspeciales,fP.clienteId,fP.productoId);return(pEsp!==null?pEsp:pr.price)*Number(fP.cantidad||1);})())}</div>{saveError&&<div style={{background:"#1c0505",border:"1px solid #991b1b",borderRadius:8,padding:"10px",marginBottom:8,color:C.err,fontSize:13}}>{saveError}</div>}<button style={S.btn} onClick={saveP} disabled={saving}>{saving?"...":"Registrar"}</button></Modal>)}
{modal==="pago"&&(<Modal title="Pago" onClose={()=>setModal(null)}><Fld label="Pedido"><select style={S.inp} value={fPago.pedidoId} onChange={e=>setFPago(f=>({...f,pedidoId:e.target.value}))}><option value="">Seleccionar</option>{pedidos.filter(p=>!p.pagado&&p.estado==="entregado").map(p=>{const cl=clientes.find(c=>c.id===p.clienteId);return<option key={p.id} value={p.id}>{cl?.nombre} - {fmt(p.total)}</option>;})}</select></Fld><Fld label="Monto"><input type="number" style={S.inp} value={fPago.monto} onChange={e=>setFPago(f=>({...f,monto:e.target.value}))} placeholder="0"/></Fld><button style={S.btn} onClick={cobrar} disabled={saving}>{saving?"...":"Confirmar"}</button></Modal>)}
</div>);}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
