function getPrecioEsp(pe,cid,pid){var c=Number(cid),p=Number(pid);for(var i=0;i<pe.length;i++){var x=pe[i];if(Number(x.clienteId||x.clienteid||0)===c&&Number(x.productoId||x.productoid||0)===p)return Number(x.precio);}return null;}

var m={1:"bidones20",2:"bidones12",3:"sifones",4:"bidones12up"};

function distM(a,b,c,d){const R=6371000,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function calcKm(puntos){let km=0;for(let i=1;i<puntos.length;i++){km+=distM(puntos[i-1].lat,puntos[i-1].lng,puntos[i].lat,puntos[i].lng);}return(km/1000).toFixed(1);}

function DetalleCliente({c,productos,cobros,pedidos,preciosEspeciales,repId,onActualizar,onCerrar,puedeEditar,onEditar}){

const pr=productos.find(p=>p.id===Number(prodId));
const precioEsp=pr?getPrecioEsp(preciosEspeciales,c.id,pr.id):null;
const precio=precioEsp!==null?precioEsp:(pr?.price||0);
const total=precio*Number(cant||1);
const d=c.saldo<0,f=c.saldo>0;
const inactivo=c.activo===false;
async function registrarVenta(){
if(!prodId||!cant||Number(cant)<=0)return;
setGuardando(true);setMsg("");
try{
const repIdFinal=repId||1;
const{error:e1}=await sb.from("pedidos").insert({clienteId:c.id,productoId:Number(prodId),repId:Number(repIdFinal),cantidad:Number(cant),fecha:today(),estado:"entregado",pagado,total,bidones_dev:Number(devBid)||0});
if(e1)throw e1;
let nuevoSaldo=c.saldo;
const bidField=getBidField(prodId);
let updateCliente={};
if(bidField){
const actual=c[bidField]||0;
const devueltos=Number(devBid)||0;
updateCliente[bidField]=Math.max(0,actual+Number(cant)-devueltos);
}
if(pagado){await sb.from("cobros").insert({clienteid:c.id,monto:total,metodopago:metodo,fecha:today(),notas:""});}
else{nuevoSaldo=(c.saldo||0)-total;}
updateCliente.saldo=nuevoSaldo;
await sb.from("clientes").update(updateCliente).eq("id",c.id);
setMsg("Venta registrada!");setCant("");setDevBid("");
onActualizar&&onActualizar();
}catch(e){setMsg("Error: "+e.message);}
setGuardando(false);}
async function registrarCobro(){
const m=Number(cobMonto);if(!m||m<=0)return;
setGuardando(true);setMsg("");
try{
const nuevoSaldo=(c.saldo||0)+m;
await sb.from("clientes").update({saldo:nuevoSaldo}).eq("id",c.id);
await sb.from("cobros").insert({clienteid:c.id,monto:m,metodopago:cobMetodo,fecha:today(),notas:cobNotas||""});
await sb.from("pedidos").update({pagado:true}).eq("clienteId",c.id).eq("pagado",false);
setMsg("Cobro: "+fmt(m));setCobMonto("");setCobNotas("");
onActualizar&&onActualizar();
}catch(e){setMsg("Error.");}
setGuardando(false);}
async function guardarPrecioEsp(){const m=Number(editPrecioVal);if(!m||m<=0)return;await sb.from("precios_especiales").update({precio:m,updated_at:new Date().toISOString()}).eq("id",editPrecio.id);setEditPrecio(null);onActualizar&&onActualizar();}
async function borrarPedido(p){if(!window.confirm("Borrar este pedido del "+p.fecha+"? Esto ajusta el saldo y bidones del cliente."))return;try{await sb.from("pedidos").delete().eq("id",p.id);const nuevoSaldo=p.pagado?(c.saldo||0):(c.saldo||0)+p.total;const nuevosBidones=Math.max(0,(c.bidones||0)-p.cantidad+(p.bidones_dev||0));await sb.from("clientes").update({saldo:nuevoSaldo,bidones:nuevosBidones}).eq("id",c.id);onActualizar&&onActualizar();}catch(e){}}
async function toggleActivo(){await sb.from("clientes").update({activo:inactivo?true:false}).eq("id",c.id);onActualizar&&onActualizar();onCerrar();}

function CerrarDiaModal({cobros,pedidos,clientes,productos,repId,onCerrar,onConfirmar}){
const [bidonesRec,setBidonesRec]=useState("");
const [msg,setMsg]=useState("");
const [guardando,setGuardando]=useState(false);
const hoy=today();
const cobHoy=cobros.filter(c=>c.fecha===hoy);
const ef=cobHoy.filter(c=>(c.metodoPago||c.metodopago)==="Efectivo").reduce((a,c)=>a+c.monto,0);
const tr=cobHoy.filter(c=>(c.metodoPago||c.metodopago)==="Transferencia"||(c.metodoPago||c.metodopago)==="QR").reduce((a,c)=>a+c.monto,0);
const ta=cobHoy.filter(c=>(c.metodoPago||c.metodopago)==="Tarjeta").reduce((a,c)=>a+c.monto,0);
const ot=cobHoy.filter(c=>(c.metodoPago||c.metodopago)==="Otros").reduce((a,c)=>a+c.monto,0);
const entHoy=pedidos.filter(p=>p.fecha===hoy&&p.estado==="entregado");
const sinCob=entHoy.filter(p=>!p.pagado).reduce((a,p)=>a+p.total,0);
const tot=ef+tr+ta+ot;
async function confirmar(){
setGuardando(true);setMsg("");
try{
await sb.from("cierres_dia").delete().eq("fecha",hoy).eq("repartidorid",Number(repId));
const{error}=await sb.from("cierres_dia").insert({fecha:hoy,repartidorid:Number(repId),ventas_efectivo:ef,ventas_transferencia:tr,ventas_tarjeta:ta,ventas_otros:ot,ventas_credito:sinCob,total_ventas:tot+sinCob,bidones_devueltos:Number(bidonesRec)||0,cerrado_por_rep:true});
if(error)throw error;
localStorage.removeItem("vn_gps");
setMsg("Dia cerrado!");
setTimeout(()=>onConfirmar&&onConfirmar(),1500);
}catch(e){setMsg("Error: "+e.message);}
setGuardando(false);
}

<div style={{position:"fixed",inset:0,background:C.bg,zIndex:3000,display:"flex",flexDirection:"column"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",borderBottom:"1px solid "+C.border,paddingTop:"max(16px,env(safe-area-inset-top))",background:C.bg}}>

</div>
<div style={{flex:1,overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"16px 16px 80px"}}>

<div style={{fontWeight:700,color:C.acc3,fontSize:15,marginBottom:12}}>Resumen - {hoy}</div>
<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.text3}}>Entregas</span><span style={{color:C.text,fontWeight:700}}>{entHoy.length}</span></div>
<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.text3}}>Efectivo</span><span style={{color:C.grn3,fontWeight:800}}>{fmt(ef)}</span></div>
<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.text3}}>Transfer/QR</span><span style={{color:C.acc3,fontWeight:700}}>{fmt(tr)}</span></div>
<div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}><span style={{color:C.err}}>Sin cobrar</span><span style={{color:C.err,fontWeight:700}}>{fmt(sinCob)}</span></div>
<div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderTop:"2px solid "+C.border2,marginTop:4}}><span style={{color:C.text,fontWeight:700,fontSize:15}}>TOTAL COBRADO</span><span style={{color:C.grn3,fontWeight:900,fontSize:22}}>{fmt(tot)}</span></div>
</div>
<div style={{background:C.card,borderRadius:13,padding:16,marginBottom:14,border:"1px solid "+C.border}}>
<div style={{fontWeight:700,color:C.text,fontSize:14,marginBottom:10}}>Detalle</div>
{entHoy.map(function(p){
var cl=clientes.find(function(c){return c.id===p.clienteId;});
var pr=productos.find(function(x){return x.id===p.productoId;});

<div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+C.border}}>

<div style={{textAlign:"right"}}><div style={{color:p.pagado?C.grn3:C.err,fontWeight:700}}>{fmt(p.total)}</div></div>
</div>
);
})}
</div>
<div style={{background:C.card,borderRadius:13,padding:16,marginBottom:14,border:"1px solid #854d0e"}}>
<div style={{fontWeight:700,color:C.warn,fontSize:14,marginBottom:10}}>Bidones vacios recibidos</div>
<input type="number" min={0} style={S.inp} value={bidonesRec} onChange={function(e){setBidonesRec(e.target.value);}} placeholder="Cantidad"/>
</div>
{msg?(
<div style={{background:msg.startsWith("Error")?"#1c0505":"#052e16",border:"1px solid "+(msg.startsWith("Error")?"#991b1b":C.grn2),borderRadius:10,padding:"14px",color:msg.startsWith("Error")?C.err:C.grn3,fontWeight:700,fontSize:15,textAlign:"center"}}>{msg}</div>
):(
<button onClick={confirmar} disabled={guardando} style={{...S.btnG,fontSize:17,padding:"16px"}}>{guardando?"Cerrando...":"Confirmar cierre del dia"}</button>
)}
</div>
</div>
);
}

function EditProductoModal({producto,onCerrar,onGuardado}){
const esNuevo=!producto.id;
const [name,setName]=useState(producto.name||"");
const [price,setPrice]=useState(producto.price||"");
const [existencia,setExistencia]=useState(producto.existencia||0);
const [tipoEnvase,setTipoEnvase]=useState(producto.tipo_envase||"retornable");

const [subiendo,setSubiendo]=useState(false);
const [guardando,setGuardando]=useState(false);
const [msg,setMsg]=useState("");
async function subirFoto(e){
const file=e.target.files[0];
if(!file)return;
setSubiendo(true);
try{
const ext=file.name.split(".").pop();
const path="productos/"+Date.now()+"."+ext;
const{error}=await sb.storage.from("fotos").upload(path,file);
if(error)throw error;
const{data}=sb.storage.from("fotos").getPublicUrl(path);
setFotoUrl(data.publicUrl);
}catch(e){setMsg("Error al subir foto: "+e.message);}
setSubiendo(false);}
async function guardar(){
if(!name.trim()||!price)return;
setGuardando(true);setMsg("");
try{
const datos={name,price:Number(price),existencia:Number(existencia)||0,tipo_envase:tipoEnvase,foto_url:fotoUrl||null};
if(esNuevo){await sb.from("productos").insert(datos);}
else{await sb.from("productos").update(datos).eq("id",producto.id);}
onGuardado&&onGuardado();
onCerrar();
}catch(e){setMsg("Error: "+e.message);}
setGuardando(false);}
return(
<div style={{position:"fixed",inset:0,background:C.bg,zIndex:3000,display:"flex",flexDirection:"column"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",borderBottom:"1px solid "+C.border,paddingTop:"max(16px,env(safe-area-inset-top))"}}>
<span style={{fontWeight:700,fontSize:17,color:C.text}}>{esNuevo?"Nuevo producto":"Editar producto"}</span>
<button onClick={onCerrar} style={{background:C.bg2,border:"1px solid "+C.border,color:C.text2,cursor:"pointer",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:700}}>Cerrar</button>
</div>
<div style={{flex:1,overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"18px"}}>
<div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
{fotoUrl?<img src={fotoUrl} style={{width:100,height:100,borderRadius:14,objectFit:"cover",border:"1px solid "+C.border}}/>:<div style={{width:100,height:100,borderRadius:14,background:C.bg2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36}}>💧</div>}
</div>
<label style={{display:"block",textAlign:"center",marginBottom:18}}>
<span style={{background:C.bg3,color:C.acc3,border:"1px solid "+C.border2,borderRadius:8,padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:700,display:"inline-block"}}>{subiendo?"Subiendo...":"📷 Cambiar foto"}</span>
<input type="file" accept="image/*" onChange={subirFoto} style={{display:"none"}} disabled={subiendo}/>
</label>
<Fld label="Nombre"><input style={S.inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Bidon 20L"/></Fld>
<Fld label="Precio"><input type="number" style={S.inp} value={price} onChange={e=>setPrice(e.target.value)} placeholder="0"/></Fld>
<Fld label="Existencia (stock)"><input type="number" style={S.inp} value={existencia} onChange={e=>setExistencia(e.target.value)} placeholder="0"/></Fld>
<Fld label="Tipo de envase">
<div style={{display:"flex",gap:8}}>
<button onClick={()=>setTipoEnvase("retornable")} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid "+(tipoEnvase==="retornable"?C.grn2:C.border),background:tipoEnvase==="retornable"?"#052e16":C.bg2,color:tipoEnvase==="retornable"?C.grn3:C.text2,cursor:"pointer",fontWeight:700,fontSize:13}}>Retornable</button>
<button onClick={()=>setTipoEnvase("descartable")} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid "+(tipoEnvase==="descartable"?C.border2:C.border),background:tipoEnvase==="descartable"?C.bg3:C.bg2,color:tipoEnvase==="descartable"?C.acc3:C.text2,cursor:"pointer",fontWeight:700,fontSize:13}}>Descartable</button>
</div>
</Fld>
{msg&&<div style={{color:C.err,fontSize:12,marginBottom:10}}>{msg}</div>}
<button onClick={guardar} disabled={guardando} style={S.btnG}>{guardando?"Guardando...":"Guardar"}</button>
</div>
</div>
);}

{ajusteC&&(<div style={{position:"fixed",inset:0,background:C.bg,zIndex:2000,display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",borderBottom:"1px solid "+C.border,paddingTop:"max(16px,env(safe-area-inset-top))"}}><span style={{fontWeight:700,fontSize:17,color:C.text}}>Saldo - {ajusteC.nombre}</span><button onClick={()=>setAjusteC(null)} style={{background:C.bg2,border:"1px solid "+C.border,color:C.text2,cursor:"pointer",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:700}}>✕ Cerrar</button></div><div style={{flex:1,overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"18px"}}><div style={{background:C.bg2,borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:C.text2}}>Saldo actual: <span style={{color:ajusteC.saldo<0?C.err:ajusteC.saldo>0?C.grn3:C.text2,fontWeight:700}}>{ajusteC.saldo<0?"-":ajusteC.saldo>0?"+":""}{fmt(ajusteC.saldo)}</span></div><Fld label="Tipo"><div style={{display:"flex",gap:8}}><button onClick={()=>setAjusteTipo("debe")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="debe"?"#991b1b":C.border),background:ajusteTipo==="debe"?"#1c0505":C.bg2,color:ajusteTipo==="debe"?C.err:C.text2,cursor:"pointer",fontWeight:700}}>Debe</button><button onClick={()=>setAjusteTipo("favor")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="favor"?C.grn2:C.border),background:ajusteTipo==="favor"?C.bg3:C.bg2,color:ajusteTipo==="favor"?C.grn3:C.text2,cursor:"pointer",fontWeight:700}}>A favor</button></div></Fld><Fld label="Monto"><input type="number" style={S.inp} value={ajusteMonto} onChange={e=>setAjusteMonto(e.target.value)} placeholder="0"/></Fld><button style={S.btn} onClick={ajustarSaldo} disabled={saving}>{saving?"...":"Confirmar"}</button></div></div>)}
{modal==="cliente"&&(<div style={{position:"fixed",inset:0,background:C.bg,zIndex:2000,display:"flex",flexDirection:"column"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px",borderBottom:"1px solid "+C.border,paddingTop:"max(16px,env(safe-area-inset-top))"}}><span style={{fontWeight:700,fontSize:17,color:C.text}}>{editC?"Editar cliente":"Nuevo cliente"}</span><button onClick={()=>setModal(null)} style={{background:C.bg2,border:"1px solid "+C.border,color:C.text2,cursor:"pointer",borderRadius:8,padding:"6px 14px",fontSize:13,fontWeight:700}}>✕ Cerrar</button></div><div style={{flex:1,overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"18px 18px 80px"}}><Fld label="Nombre"><input style={S.inp} value={fC.nombre} onChange={e=>setFC(f=>({...f,nombre:e.target.value}))} placeholder="Nombre"/></Fld><Fld label="Telefono"><input style={S.inp} type="tel" value={fC.telefono} onChange={e=>setFC(f=>({...f,telefono:e.target.value}))} placeholder="Tel"/></Fld><Fld label="Email"><input style={S.inp} type="email" value={fC.email} onChange={e=>setFC(f=>({...f,email:e.target.value}))} placeholder="Email"/></Fld><Fld label="Direccion"><input style={S.inp} value={fC.direccion} onChange={e=>setFC(f=>({...f,direccion:e.target.value}))} placeholder="Direccion"/></Fld><Fld label="Zona"><select style={S.inp} value={fC.zona} onChange={e=>setFC(f=>({...f,zona:e.target.value}))}>{ZONAS.map(z=><option key={z} value={z}>{z}</option>)}</select></Fld><Fld label="Notas"><textarea style={{...S.inp,resize:"vertical",minHeight:60}} value={fC.notas} onChange={e=>setFC(f=>({...f,notas:e.target.value}))} placeholder="Notas"/></Fld><Fld label="Foto de la casa"><div style={{background:C.bg2,borderRadius:10,padding:12,border:"1px solid "+C.border}}>{editC?.foto_url&&<img src={editC.foto_url} style={{width:"100%",maxHeight:120,objectFit:"cover",borderRadius:8,marginBottom:8}}/>}<input type="file" accept="image/*" capture="environment" onChange={e=>setFotoFile(e.target.files[0])} style={{color:C.text2,fontSize:13,width:"100%"}}/>{fotoFile&&<div style={{color:C.grn3,fontSize:12,marginTop:6}}>Foto lista para subir</div>}</div></Fld><div style={{background:C.bg2,borderRadius:11,padding:14,marginBottom:13,border:"1px solid "+C.border}}><div style={{fontWeight:700,color:C.grn3,fontSize:14,marginBottom:6}}>GPS</div><button onClick={getGPS} style={S.btnG}>Guardar ubicacion GPS</button>{geoMsg&&<div style={{fontSize:12,textAlign:"center",marginTop:10,padding:"8px",borderRadius:8,background:geoMsg.startsWith("GPS")?C.bg3:"#1c0505",color:geoMsg.startsWith("GPS")?C.grn3:C.err}}>{geoMsg}</div>}</div>{saveError&&<div style={{background:"#1c0505",border:"1px solid #991b1b",borderRadius:8,padding:"10px",marginBottom:8,color:C.err,fontSize:13}}>{saveError}</div>}<button style={S.btn} onClick={saveC} disabled={saving}>{saving?"...":editC?"Guardar cambios":"Agregar cliente"}</button>{editC&&<button style={{...S.btnR,marginTop:10}} onClick={()=>delCliente(editC.id)}>Eliminar cliente</button>}</div></div>)}
</div>);}

function MapaGeneral({clientes,userLat,userLng}){
const ref=useRef(null),map=useRef(null);
const DEF_LAT=-33.8891,DEF_LNG=-61.1234;
useEffect(()=>{
if(!window.L||!ref.current||map.current)return;
const L=window.L;
const lat=userLat||(clientes.find(c=>c.lat)?.lat)||DEF_LAT;
const lng=userLng||(clientes.find(c=>c.lng)?.lng)||DEF_LNG;
map.current=L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([lat,lng],13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map.current);
setTimeout(()=>map.current&&map.current.invalidateSize(),300);
clientes.forEach(c=>{
if(!c.lat||!c.lng)return;
const col=c.saldo<0?"#f87171":c.saldo>0?"#4ade80":"#00d4ff";
const ic=L.divIcon({className:"",html:"<div style='width:22px;height:22px;border-radius:50% 50% 50% 0;background:"+col+";border:2px solid #030d1a;transform:rotate(-45deg);box-shadow:0 2px 6px rgba(0,0,0,.5)'></div>",iconSize:[22,22],iconAnchor:[11,22]});
L.marker([c.lat,c.lng],{icon:ic}).addTo(map.current).bindPopup("<b>"+c.nombre+"</b><br>"+c.direccion+"<br><span style='color:"+(c.saldo<0?"#f87171":c.saldo>0?"#4ade80":"#6aaddf")+"'>Saldo: "+(c.saldo!==0?(c.saldo<0?"-":"+")+"$"+Math.abs(c.saldo).toLocaleString("es-AR"):"$0")+"</span>");
});
if(userLat&&userLng){const ui=L.divIcon({className:"",html:"<div style='width:12px;height:12px;border-radius:50%;background:#00d4ff;border:2px solid #fff;'></div>",iconSize:[12,12],iconAnchor:[6,6]});L.marker([userLat,userLng],{icon:ui}).addTo(map.current);}
return()=>{if(map.current){map.current.remove();map.current=null;}};
},[]);
return <div ref={ref} style={{width:"100%",height:"calc(100vh - 220px)",minHeight:300,borderRadius:12,overflow:"hidden",border:"1px solid "+C.border}}/>;}

function MapaRepartidor({repartidores,ubicaciones,recorrido}){
const ref=useRef(null),map=useRef(null);
const DEF_LAT=-33.8891,DEF_LNG=-61.1234;
useEffect(()=>{
if(!window.L||!ref.current||map.current)return;
const L=window.L;
const lat=ubicaciones[0]?.lat||DEF_LAT;
const lng=ubicaciones[0]?.lng||DEF_LNG;
map.current=L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([lat,lng],14);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map.current);
setTimeout(()=>map.current&&map.current.invalidateSize(),300);
if(recorrido&&recorrido.length>1){L.polyline(recorrido.map(u=>[u.lat,u.lng]),{color:"#00d4ff",weight:3,opacity:.7,dashArray:"6,4"}).addTo(map.current);}
repartidores.forEach(rep=>{
const ub=ubicaciones.find(u=>u.repartidorId===rep.id);
if(!ub)return;
const ri=L.divIcon({className:"",html:"<div style='background:#f59e0b;border:3px solid #fff;border-radius:50%;width:24px;height:24px;box-shadow:0 0 12px #f59e0b;display:flex;align-items:center;justify-content:center;font-size:13px;'>🚚</div>",iconSize:[24,24],iconAnchor:[12,12]});
L.marker([ub.lat,ub.lng],{icon:ri}).addTo(map.current).bindPopup("<b>"+rep.name+"</b><br>"+new Date(ub.created_at).toLocaleTimeString());
});
return()=>{if(map.current){map.current.remove();map.current=null;}};
},[]);
return <div ref={ref} style={{width:"100%",height:"calc(100vh - 260px)",minHeight:280,borderRadius:12,overflow:"hidden",border:"1px solid "+C.border}}/>;}

function MapaVisitas({clientes,pedidos,fecha}){
const ref=useRef(null),map=useRef(null);
const DEF_LAT=-33.8891,DEF_LNG=-61.1234;
const pedsFecha=pedidos.filter(p=>p.fecha===fecha&&p.estado==="entregado");
const visitados=clientes.filter(c=>pedsFecha.some(p=>p.clienteId===c.id)&&c.lat&&c.lng);
useEffect(()=>{
if(!window.L||!ref.current||map.current)return;
const L=window.L;
const lat=(visitados[0]?.lat)||DEF_LAT;
const lng=(visitados[0]?.lng)||DEF_LNG;
map.current=L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([lat,lng],14);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map.current);
setTimeout(()=>map.current&&map.current.invalidateSize(),300);
visitados.forEach(c=>{
const peds=pedsFecha.filter(p=>p.clienteId===c.id);
const cobrado=peds.some(p=>p.pagado);
const col=cobrado?"#4ade80":"#fbbf24";
const ic=L.divIcon({className:"",html:"<div style='width:28px;height:28px;border-radius:50%;background:"+col+";border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:13px;'>"+(cobrado?"✓":"$")+"</div>",iconSize:[28,28],iconAnchor:[14,14]});
const total=peds.reduce((a,p)=>a+p.total,0);
L.marker([c.lat,c.lng],{icon:ic}).addTo(map.current).bindPopup("<b>"+c.nombre+"</b><br>"+c.direccion+"<br>Total: $"+total.toLocaleString("es-AR")+"<br><span style='color:"+col+"'>"+(cobrado?"Cobrado":"Sin cobrar")+"</span>");
});
return()=>{if(map.current){map.current.remove();map.current=null;}};
},[]);
return <div ref={ref} style={{width:"100%",height:"calc(100vh - 310px)",minHeight:260,borderRadius:12,overflow:"hidden",border:"1px solid "+C.border}}/>;}
