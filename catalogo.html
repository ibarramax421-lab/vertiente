<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Vertiente Natural - Catálogo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#050f1a;font-family:-apple-system,sans-serif;color:#e0f0ff;min-height:100vh;}
.header{background:linear-gradient(135deg,#071828,#0a2038);border-bottom:1px solid #1e4a6e;padding:16px 18px;text-align:center;position:sticky;top:0;z-index:100;}
.header h1{font-size:20px;font-weight:800;color:#e0f0ff;}
.header p{font-size:12px;color:#4a7fa5;margin-top:2px;}
.lista{display:flex;flex-direction:column;gap:16px;padding:16px;max-width:480px;margin:0 auto;}
.card{background:#0d2137;border:1px solid #1e4a6e;border-radius:18px;overflow:hidden;display:flex;align-items:center;gap:0;}
.card img{width:140px;height:140px;object-fit:cover;object-position:center;flex-shrink:0;}
.card-body{padding:14px 16px;flex:1;}
.card-nombre{font-weight:700;font-size:16px;color:#e0f0ff;margin-bottom:4px;line-height:1.2;}
.card-precio{font-size:22px;font-weight:900;color:#38bdf8;margin-bottom:14px;}
.qty-control{display:flex;align-items:center;gap:10px;}
.qty-btn{width:36px;height:36px;border-radius:50%;border:none;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-minus{background:#1c0505;color:#f87171;}
.qty-plus{background:#052e16;color:#4ade80;}
.qty-num{font-size:20px;font-weight:800;color:#e0f0ff;min-width:30px;text-align:center;}
.footer{max-width:480px;margin:0 auto;padding:16px;padding-bottom:40px;}
.total-box{background:#071828;border:1px solid #166534;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.total-label{font-size:12px;color:#6aaddf;font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.total-valor{font-size:30px;font-weight:900;color:#4ade80;}
.btn-wa{background:linear-gradient(135deg,#059669,#047857);color:#fff;border:none;border-radius:14px;padding:18px;width:100%;font-size:17px;font-weight:800;cursor:pointer;}
.btn-wa:disabled{opacity:.4;cursor:not-allowed;}
.sin-pedido{text-align:center;color:#4a7fa5;font-size:13px;padding:8px 0;}
</style>
</head>
<body>
<div class="header">

<p>Seleccioná tus productos y pedí por WhatsApp</p>

const cantidades = {};
productos.forEach(p => cantidades[p.id] = 0);
function fmt(n){return "$"+n.toLocaleString("es-AR");}
function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  productos.forEach(p => {
    const c = cantidades[p.id];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img src="${p.img}" alt="${p.nombre}"/>
      <div class="card-body">
        <div class="card-nombre">${p.nombre}</div>
        <div class="card-precio">${fmt(p.precio)}</div>
        <div class="qty-control">
          <button class="qty-btn qty-minus" onclick="cambiar('${p.id}',-1)">−</button>
          <span class="qty-num">${c}</span>
          <button class="qty-btn qty-plus" onclick="cambiar('${p.id}',1)">+</button>
        </div>
      </div>`;
    lista.appendChild(card);
  });
  let total = 0;
  productos.forEach(p => total += cantidades[p.id] * p.precio);
  document.getElementById("total").textContent = fmt(total);
  const hayPedido = Object.values(cantidades).some(v => v > 0);
  document.getElementById("btn-wa").disabled = !hayPedido;
  document.getElementById("sin-pedido").style.display = hayPedido ? "none" : "block";
}
function cambiar(id, delta){
  cantidades[id] = Math.max(0, cantidades[id] + delta);
  render();
}
function pedirWhatsApp(){
  let msg = "*Pedido - Vertiente Natural*\n\n";
  let total = 0;
  productos.forEach(p => {
    if(cantidades[p.id] > 0){
      const subtotal = cantidades[p.id] * p.precio;
      msg += `• ${cantidades[p.id]}x ${p.nombre} = ${fmt(subtotal)}\n`;
      total += subtotal;
    }
  });
  msg += `\n*Total: ${fmt(total)}*`;
  window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
}
render();
</script>
