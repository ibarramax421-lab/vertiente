y+=4;doc.setDrawColor(30,74,110);doc.line(M,y,W-M,y);y+=8;const resumen=resumenPorProducto();doc.setFontSize(12);doc.setTextColor(56,189,248);doc.setFont("helvetica","bold");doc.text("Resumen por producto",M,y);y+=7;resumen.forEach(r=>{if(y>270){doc.addPage();doc.setFillColor(5,15,26);doc.rect(0,0,W,297,"F");y=20;}doc.setFontSize(10);doc.setTextColor(224,240,255);doc.setFont("helvetica","bold");doc.text(r.name+" ($"+r.price.toFixed(2)+" c/u)",M,y);y+=5;doc.setFont("helvetica","normal");doc.setFontSize(9);doc.setTextColor(106,173,223);doc.text("Total entregado: "+r.totalUds+" unid = $"+r.totalMonto.toFixed(2),M+5,y);y+=5;if(r.pagadoUds>0){doc.setTextColor(74,222,128);doc.text("Pagado: "+r.pagadoUds+" unid = $"+r.pagadoMonto.toFixed(2),M+5,y);y+=5;}if(r.debeUds>0){doc.setTextColor(248,113,113);doc.text("Debe: "+r.debeUds+" unid = $"+r.debeMonto.toFixed(2),M+5,y);y+=5;}y+=2;});y+=2;doc.setDrawColor(30,74,110);doc.line(M,y,W-M,y);y+=7;const totalEntregado=historial.reduce((a,p)=>a+p.total,0);const totalPagado=historial.filter(p=>p.pagado).reduce((a,p)=>a+p.total,0);const totalDebe=historial.filter(p=>!p.pagado).reduce((a,p)=>a+p.total,0);doc.setFontSize(10);doc.setFont("helvetica","normal");doc.setTextColor(224,240,255);doc.text("Total entregado: $"+totalEntregado.toFixed(2),M,y);y+=5;doc.setTextColor(74,222,128);doc.text("Total pagado: $"+totalPagado.toFixed(2),M,y);y+=5;doc.setTextColor(248,113,113);doc.text("Total adeudado: $"+totalDebe.toFixed(2),M,y);y+=8;doc.setFontSize(11);doc.setTextColor(251,191,36);doc.setFont("helvetica","bold");doc.text("Bidones en su poder: "+bidones,M,y);y+=8;doc.setFontSize(13);const saldoColor=d?[248,113,113]:f?[74,222,128]:[74,127,165];doc.setTextColor(...saldoColor);doc.text("SALDO ACTUAL: "+(d?"-":f?"+":"")+"$"+Math.abs(c.saldo).toFixed(2),M,y);doc.save("cuenta-"+c.nombre.replace(/\s+/g,"-")+".pdf");}

async function saveC(){if(!fC.nombre.trim())return;setSaving(true);setSaveError("");try{const datos={nombre:fC.nombre,telefono:fC.telefono||"",email:fC.email||"",direccion:fC.direccion||"",ciudad:fC.ciudad||"",provincia:fC.provincia||"",pais:fC.pais||"",zona:fC.zona||"Z1",notas:fC.notas||"",lat:fC.lat||null,lng:fC.lng||null};if(editC){const{error}=await sb.from("clientes").update(datos).eq("id",editC.id);if(error)throw error;}else{const{error}=await sb.from("clientes").insert({...datos,saldo:0,bidones:0});if(error)throw error;}await cargarDatos();setModal(null);setEditC(null);}catch(e){setSaveError("Error: "+e.message);}setSaving(false);}
async function delCliente(id){await sb.from("clientes").delete().eq("id",id);await cargarDatos();setDelC(null);setModal(null);}
async function saveP(){if(!fP.clienteId||!fP.productoId||!fP.repId)return;const pr=productos.find(p=>p.id===Number(fP.productoId));const total=pr.price*Number(fP.cantidad);setSaving(true);setSaveError("");try{const{error:e1}=await sb.from("pedidos").insert({clienteId:Number(fP.clienteId),productoId:Number(fP.productoId),repId:Number(fP.repId),cantidad:Number(fP.cantidad),fecha:fP.fecha,estado:"pendiente",pagado:false,total});if(e1)throw e1;const cl=clientes.find(c=>c.id===Number(fP.clienteId));const{error:e2}=await sb.from("clientes").update({saldo:(cl.saldo||0)-total,bidones:(cl.bidones||0)+Number(fP.cantidad)}).eq("id",Number(fP.clienteId));if(e2)throw e2;await cargarDatos();setModal(null);setFP({clienteId:"",productoId:"",cantidad:1,repId:"",fecha:today(),estado:"pendiente"});}catch(e){setSaveError("Error: "+e.message);}setSaving(false);}
async function entregar(id){await sb.from("pedidos").update({estado:"entregado"}).eq("id",id);await cargarDatos();}
async function cobrar(){const m=Number(fPago.monto);if(!m||!fPago.pedidoId)return;const pd=pedidos.find(p=>p.id===Number(fPago.pedidoId));if(!pd)return;setSaving(true);try{await sb.from("pedidos").update({pagado:true}).eq("id",Number(fPago.pedidoId));const cl=clientes.find(c=>c.id===pd.clienteId);await sb.from("clientes").update({saldo:(cl.saldo||0)+m}).eq("id",pd.clienteId);await cargarDatos();setModal(null);setFPago({monto:"",pedidoId:""});}catch(e){setSaveError("Error al registrar pago.");}setSaving(false);}

<div style={{marginTop:16,color:"#22c55e",fontWeight:600,fontSize:13,marginBottom:8}}>Saldos de clientes</div>{clientes.map(c=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#0d2137",borderRadius:9,padding:"10px 13px",marginBottom:7,border:"1px solid #1e4a6e"}}><span style={{color:"#c0ddf0",fontSize:13}}>{c.nombre}</span><span style={{fontWeight:700,color:c.saldo<0?"#f87171":c.saldo>0?"#4ade80":"#4a7fa5"}}>{c.saldo<0?"-":c.saldo>0?"+":""}{fmt(c.saldo)}</span></div>))}
</div>);}
if(tab==="stats"){const tot=pedidos.reduce((a,p)=>a+p.total,0);const byPr=productos.map(pr=>({...pr,uds:pedidos.filter(p=>p.productoId===pr.id).reduce((a,p)=>a+p.cantidad,0),ing:pedidos.filter(p=>p.productoId===pr.id&&p.pagado).reduce((a,p)=>a+p.total,0)}));const topC=clientes.map(c=>({...c,tot:pedidos.filter(p=>p.clienteId===c.id).reduce((a,p)=>a+p.total,0),n:pedidos.filter(p=>p.clienteId===c.id).length})).sort((a,b)=>b.tot-a.tot);const totalBidones=clientes.reduce((a,c)=>a+(c.bidones||0),0);return(<div><div style={{background:"#1c1003",border:"1px solid #854d0e",borderRadius:13,padding:16,marginBottom:13}}><div style={{fontWeight:700,color:"#fbbf24",marginBottom:4,fontSize:14}}>🫙 Bidones en calle</div><div style={{fontSize:32,fontWeight:900,color:"#fbbf24"}}>{totalBidones}</div><div style={{fontSize:11,color:"#854d0e",marginTop:4}}>Total en poder de clientes</div></div><div style={{background:"#0d2137",borderRadius:13,padding:16,marginBottom:13,border:"1px solid #1e4a6e"}}><div style={{fontWeight:700,color:"#e0f0ff",marginBottom:11}}>📦 Ventas por producto</div>{byPr.map(p=>(<div key={p.id} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{color:"#c0ddf0",fontSize:13}}>{p.name}</span><span style={{color:"#38bdf8",fontWeight:700,fontSize:13}}>{p.uds} uds · {fmt(p.ing)}</span></div><div style={{background:"#071828",borderRadius:99,height:6}}><div style={{height:"100%",background:"linear-gradient(90deg,#0ea5e9,#38bdf8)",width:(tot>0?(p.ing/tot)*100:0)+"%",borderRadius:99}}/></div></div>))}</div><div style={{background:"#0d2137",borderRadius:13,padding:16,border:"1px solid #1e4a6e"}}><div style={{fontWeight:700,color:"#e0f0ff",marginBottom:11}}>🏆 Mejores clientes</div>{topC.map((c,i)=>(<div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #1e4a6e"}}><div style={{width:26,height:26,borderRadius:"50%",flexShrink:0,background:["#f59e0b","#9ca3af","#b45309"][i]||"#1e4a6e",display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:900,fontSize:11}}>{i+1}</div><div style={{flex:1}}><div style={{color:"#e0f0ff",fontWeight:600,fontSize:13}}>{c.nombre}</div><div style={{color:"#4a7fa5",fontSize:11}}>{c.n} pedidos {(c.bidones||0)>0&&<span style={{color:"#fbbf24"}}>· 🫙 {c.bidones}</span>}</div></div><div style={{color:"#38bdf8",fontWeight:700}}>{fmt(c.tot)}</div></div>))}</div></div>);}
return null;}
return(<div style={{minHeight:"100vh",background:"#050f1a"}}>
<div style={{background:"linear-gradient(90deg,#071828,#0a2038)",borderBottom:"1px solid #1e4a6e",padding:"12px 18px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:50,paddingTop:"max(14px,env(safe-area-inset-top))"}}>

<div style={{flex:1}}><div style={{fontWeight:800,fontSize:16,color:"#e0f0ff",lineHeight:1}}>Vertiente Natural</div><div style={{fontSize:10,color:"#4a7fa5"}}>Administrador</div></div>
<button onClick={()=>cargarDatos(true)} style={{background:"none",border:"none",cursor:"pointer",color:"#38bdf8",padding:"4px"}}>{refreshing?<div style={{width:20,height:20,border:"2px solid #38bdf8",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>:<I d={IC.rf} z={20}/>}</button>
<button onClick={cambiarRol} style={{background:"#071828",border:"1px solid #1e4a6e",color:"#6aaddf",borderRadius:8,padding:"5px 10px",cursor:"pointer",fontSize:11}}>Cambiar rol</button>

<div style={{padding:"16px 14px 110px",maxWidth:560,margin:"0 auto"}}>
<div style={{fontSize:18,fontWeight:800,color:"#e0f0ff",marginBottom:14}}>{NAV.find(n=>n.id===tab)?.label}</div>

</div>
<div style={{position:"fixed",bottom:0,left:0,right:0,background:"#071828",borderTop:"1px solid #1e4a6e",display:"flex",justifyContent:"space-around",padding:"8px 0",paddingBottom:"max(14px,env(safe-area-inset-bottom))",zIndex:50}}>
{NAV.map(n=>(<button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===n.id?"#38bdf8":"#4a7fa5",padding:"4px 6px",borderRadius:7}}><I d={n.icon} z={18}/><span style={{fontSize:8,fontWeight:tab===n.id?700:500}}>{n.label}</span></button>))}
</div>
{modal==="mapa"&&(<Modal title="Mapa de clientes" onClose={()=>setModal(null)}><MapaGeneral clientes={clientes} userLat={userPos?.lat} userLng={userPos?.lng}/>{!userPos&&<div style={{color:"#fbbf24",fontSize:12,marginTop:10,textAlign:"center"}}>Activa GPS para ver el radar de 300m</div>}{cercanos.length>0&&(<div style={{marginTop:13}}><div style={{color:"#38bdf8",fontWeight:700,marginBottom:7,fontSize:13}}>📡 Dentro de 300m</div>{cercanos.map(c=>(<div key={c.id} style={{display:"flex",justifyContent:"space-between",background:"#071828",borderRadius:8,padding:"8px 11px",marginBottom:5}}><span style={{color:"#e0f0ff",fontWeight:600}}>{c.nombre} <span style={{color:"#4a7fa5",fontSize:11}}>{c.dist}m</span></span><span style={{color:c.saldo<0?"#f87171":c.saldo>0?"#4ade80":"#4a7fa5",fontWeight:700}}>{c.saldo<0?"-":c.saldo>0?"+":""}{fmt(c.saldo)}</span></div>))}</div>)}</Modal>)}
{verC&&<DetalleCliente c={verC} pedidos={pedidos} productos={productos} cobros={cobros} onActualizar={cargarDatos} onEditar={()=>openEditar(verC)} onCerrar={()=>setVerC(null)}/>}
{ajusteC&&(<Modal title={"Ajustar saldo - "+ajusteC.nombre} onClose={()=>setAjusteC(null)}>
<div style={{background:"#071828",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,color:"#4a7fa5"}}>Saldo actual: <span style={{color:ajusteC.saldo<0?"#f87171":ajusteC.saldo>0?"#4ade80":"#4a7fa5",fontWeight:700}}>{ajusteC.saldo<0?"-":ajusteC.saldo>0?"+":""}{fmt(ajusteC.saldo)}</span></div>
<Fld label="El cliente"><div style={{display:"flex",gap:8}}><button onClick={()=>setAjusteTipo("debe")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="debe"?"#991b1b":"#1e4a6e"),background:ajusteTipo==="debe"?"#1c0505":"#071828",color:ajusteTipo==="debe"?"#f87171":"#4a7fa5",cursor:"pointer",fontWeight:700}}>❌ Debe</button><button onClick={()=>setAjusteTipo("favor")} style={{flex:1,padding:"11px",borderRadius:8,border:"1px solid "+(ajusteTipo==="favor"?"#166534":"#1e4a6e"),background:ajusteTipo==="favor"?"#052e16":"#071828",color:ajusteTipo==="favor"?"#4ade80":"#4a7fa5",cursor:"pointer",fontWeight:700}}>✅ A favor</button></div></Fld>
<Fld label="Monto"><input type="number" style={S.inp} value={ajusteMonto} onChange={e=>setAjusteMonto(e.target.value)} placeholder="0.00"/></Fld>
<div style={{background:"#071828",borderRadius:10,padding:"12px",marginBottom:8,textAlign:"center",fontSize:13,color:"#4a7fa5"}}>Nuevo saldo: <span style={{fontWeight:800,fontSize:16,color:ajusteTipo==="debe"?"#f87171":"#4ade80"}}>{ajusteTipo==="debe"?"-":"+"}{ajusteMonto?fmt(Number(ajusteMonto)):"$0.00"}</span></div>
<button style={S.btn} onClick={ajustarSaldo} disabled={saving}>{saving?"Guardando...":"✓ Confirmar saldo inicial"}</button>
</Modal>)}
{modal==="cliente"&&(<Modal title={editC?"Editar cliente":"Nuevo cliente"} onClose={()=>setModal(null)}>
<Fld label="Nombre *"><input style={S.inp} value={fC.nombre} onChange={e=>setFC(f=>({...f,nombre:e.target.value}))} placeholder="Nombre o negocio"/></Fld>
<Fld label="Telefono"><input style={S.inp} type="tel" value={fC.telefono} onChange={e=>setFC(f=>({...f,telefono:e.target.value}))} placeholder="555-0000"/></Fld>

<Fld label="Direccion"><input style={S.inp} value={fC.direccion} onChange={e=>setFC(f=>({...f,direccion:e.target.value}))} placeholder="Calle, numero, colonia"/></Fld>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
<Fld label="Ciudad"><select style={S.inp} value={fC.ciudad} onChange={e=>setFC(f=>({...f,ciudad:e.target.value}))}><option value="">Seleccionar</option><option value="Colon">Colon</option></select></Fld>
<Fld label="Provincia"><select style={S.inp} value={fC.provincia} onChange={e=>setFC(f=>({...f,provincia:e.target.value}))}><option value="">Seleccionar</option><option value="Buenos Aires">Buenos Aires</option></select></Fld>
</div>
<Fld label="Pais"><input style={S.inp} value={fC.pais} onChange={e=>setFC(f=>({...f,pais:e.target.value}))} placeholder="Pais"/></Fld>

{geoMsg&&<div style={{fontSize:12,textAlign:"center",marginTop:10,padding:"8px",borderRadius:8,background:geoMsg.startsWith("Ubicacion")?"#052e16":"#1c0505",color:geoMsg.startsWith("Ubicacion")?"#4ade80":"#f87171"}}>{geoMsg}</div>}
</div>

{editC&&<button style={{...S.btnR,marginTop:10}} onClick={()=>setDelC(editC)}>🗑 Eliminar este cliente</button>}
</Modal>)}
{delC&&(<Modal title="Eliminar cliente?" onClose={()=>setDelC(null)}><div style={{color:"#e0f0ff",marginBottom:16,fontSize:15,textAlign:"center",lineHeight:1.6}}>Eliminar a <strong>{delC.nombre}</strong>?<br/><span style={{color:"#f87171",fontSize:13}}>Esta accion no se puede deshacer.</span></div><div style={{display:"flex",gap:10}}><button style={{...S.btn,background:"#1e4a6e",marginTop:0,flex:1}} onClick={()=>setDelC(null)}>Cancelar</button><button style={{...S.btnR,flex:1}} onClick={()=>delCliente(delC.id)}>Eliminar</button></div></Modal>)}
